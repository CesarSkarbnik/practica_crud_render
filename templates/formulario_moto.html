{% extends "base.html" %}

{% block content %}
<div class="columns is-centered">
    <div class="column is-two-thirds-desktop is-full-mobile">
        <h2 class="title is-2 has-text-centered has-text-grey-darker">
            {% if accion == 'Crear' %}
                <span class="icon"><i class="fas fa-plus-circle"></i></span> Crear Nueva Moto
            {% else %}
                <span class="icon"><i class="fas fa-edit"></i></span> Editar Motocicleta: {{ moto.modelo }}
            {% endif %}
        </h2>
        <div class="card is-rounded p-5">
            <!-- La acción del formulario depende de si estamos creando o editando -->
            <form method="POST" action="{% if accion == 'Crear' %}{{ url_for('crear_moto') }}{% else %}{{ url_for('editar_moto', id=moto.id) }}{% endif %}">

                <!-- Campo Marca (Select/Dropdown) -->
                <div class="field">
                    <label class="label">Marca</label>
                    <div class="control">
                        <div class="select is-fullwidth">
                            <select name="marca_id" required>
                                <option value="" disabled selected>--- Selecciona una Marca ---</option>
                                {% for marca in marcas %}
                                    <!-- Si estamos editando, seleccionamos la marca actual de la moto -->
                                    <option value="{{ marca.id }}" 
                                            {% if accion == 'Editar' and moto.marca_id == marca.id %}selected{% endif %}>
                                        {{ marca.nombre }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Campo Modelo -->
                <div class="field">
                    <label class="label">Modelo</label>
                    <div class="control">
                        <input class="input" type="text" name="modelo" placeholder="Ej: CBR1000RR" 
                               value="{{ moto.modelo if accion == 'Editar' else '' }}" required>
                    </div>
                </div>

                <!-- Campo Año -->
                <div class="field">
                    <label class="label">Año</label>
                    <div class="control">
                        <!-- Usamos type="number" para validación del navegador -->
                        <input class="input" type="number" name="anio" placeholder="Ej: 2024" min="1900" max="2099"
                               value="{{ moto.anio if accion == 'Editar' else '' }}" required>
                    </div>
                </div>

                <!-- Campo Precio -->
                <div class="field">
                    <label class="label">Precio ($)</label>
                    <div class="control has-icons-left">
                        <!-- Usamos type="number" con step="0.01" para permitir decimales -->
                        <input class="input" type="number" name="precio" placeholder="Ej: 15000.00" step="0.01"
                               value="{{ moto.precio if accion == 'Editar' else '' }}" required>
                        <span class="icon is-small is-left">
                            <i class="fas fa-dollar-sign"></i>
                        </span>
                    </div>
                </div>

                <!-- Botones de Acción -->
                <div class="field is-grouped is-grouped-centered mt-5">
                    <p class="control">
                        <!-- Botón principal de guardar -->
                        <button type="submit" class="button is-success is-large is-rounded">
                            <span class="icon is-medium"><i class="fas fa-save"></i></span>
                            <span>{{ accion }} Motocicleta</span>
                        </button>
                    </p>
                    <p class="control">
                        <!-- Botón de cancelar -->
                        <a href="{{ url_for('listar_motos') }}" class="button is-danger is-large is-rounded is-light">
                            <span class="icon is-medium"><i class="fas fa-times"></i></span>
                            <span>Cancelar</span>
                        </a>
                    </p>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
